services:
  - type: web
    name: toyxona-booking
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm --workspace server run db:setup
    startCommand: npm --workspace server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEED_DEMO
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: toyxona_db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false

databases:
  - name: toyxona_db
    plan: free
    databaseName: toyxona_db
    user: toyxona_db
